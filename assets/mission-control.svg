<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">

<style>
.title{
font:700 30px 'IBM Plex Mono',monospace;
fill:#F5F0E6;
}

.heading{
font:700 14px 'IBM Plex Mono',monospace;
fill:#C1813F;
letter-spacing:1px;
}

.value{
font:600 20px 'IBM Plex Mono',monospace;
fill:#F5F0E6;
}

.small{
font:500 12px 'IBM Plex Mono',monospace;
fill:#8D7B68;
}
</style>

<rect
x="0"
y="0"
width="900"
height="320"
rx="18"
fill="#171717"
/>

<text
x="40"
y="50"
class="title">
MISSION CONTROL
</text>

<!-- CARD 1 -->

<rect
x="40"
y="80"
width="185"
height="90"
rx="14"
fill="#232323"
stroke="#2C2C2C"
/>

<text
x="60"
y="108"
class="heading">
STATUS
</text>

<circle
cx="70"
cy="140"
r="7"
fill="#2F7F7A">

<animate
attributeName="opacity"
values="1;.4;1"
dur="2s"
repeatCount="indefinite"/>

</circle>

<text
x="90"
y="146"
class="value">
BUILDING
</text>

<!-- CARD 2 -->

<rect
x="245"
y="80"
width="185"
height="90"
rx="14"
fill="#232323"
stroke="#2C2C2C"/>

<text
x="265"
y="108"
class="heading">
MISSION
</text>

<text
x="265"
y="145"
class="value">
PRODUCT PM
</text>

<!-- CARD 3 -->

<rect
x="450"
y="80"
width="185"
height="90"
rx="14"
fill="#232323"
stroke="#2C2C2C"/>

<text
x="470"
y="108"
class="heading">
CURRENT BUILD
</text>

<text
x="470"
y="145"
class="value">
AI PLANNER
</text>

<!-- CARD 4 -->

<rect
x="655"
y="80"
width="205"
height="90"
rx="14"
fill="#232323"
stroke="#2C2C2C"/>

<text
x="675"
y="108"
class="heading">
CURRENT DAY
</text>

<text
x="675"
y="145"
class="value">
17 / 90
</text>

<!-- Progress -->

<text
x="40"
y="225"
class="heading">
SYSTEM PROGRESS
</text>

<rect
x="40"
y="240"
width="820"
height="16"
rx="8"
fill="#2C2C2C"/>

<rect
x="40"
y="240"
width="160"
height="16"
rx="8"
fill="#C1813F">

<animate
attributeName="width"
from="0"
to="160"
dur="2.5s"
fill="freeze"/>

</rect>

<text
x="40"
y="290"
class="small">
Building products. Learning publicly. Improving every day.
</text>

</svg>
