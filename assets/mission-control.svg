<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" width="1200" height="450">
  <defs>
    <filter id="status-glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="450" fill="#171717" rx="16"/>
  <line x1="24" y1="100" x2="1176" y2="100" stroke="#232323" stroke-width="1"/>

  <!-- name -->
  <text x="24" y="46" font-family="IBM Plex Mono, monospace" font-size="28" font-weight="600" fill="#F5F0E6">KRISHANU MAHAPATRA</text>
  <rect x="24" y="54" width="0" height="2" fill="#C1813F"><animate attributeName="width" values="0;280;280;0" keyTimes="0;0.3;0.8;1" dur="4s" repeatCount="indefinite"/></rect>
  <text x="24" y="72" font-family="IBM Plex Mono, monospace" font-size="14" fill="#9A8C7C">Building my way into Product Management</text>

  <!-- status row -->
  <circle cx="40" cy="124" r="6" fill="#2F7F7A" filter="url(#status-glow)">
    <animate attributeName="r" values="6;8;6" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <text x="58" y="130" font-family="IBM Plex Mono, monospace" font-size="13" font-weight="600" fill="#2F7F7A" letter-spacing="1">SYSTEM ONLINE</text>

  <!-- metrics row 1 -->
  <text x="24" y="160" font-family="IBM Plex Mono, monospace" font-size="11" fill="#9A8C7C" letter-spacing="0.5">MISSION</text>
  <text x="24" y="182" font-family="IBM Plex Mono, monospace" font-size="14" fill="#F5F0E6">Building products that solve</text>
  <text x="24" y="200" font-family="IBM Plex Mono, monospace" font-size="14" fill="#F5F0E6">real problems</text>

  <text x="340" y="160" font-family="IBM Plex Mono, monospace" font-size="11" fill="#9A8C7C" letter-spacing="0.5">CURRENT BUILD</text>
  <text x="340" y="182" font-family="IBM Plex Mono, monospace" font-size="14" fill="#F5F0E6">AI Planning Platform</text>
  <text x="340" y="200" font-family="IBM Plex Mono, monospace" font-size="14" fill="#F5F0E6">(Claude + Web Search)</text>

  <text x="656" y="160" font-family="IBM Plex Mono, monospace" font-size="11" fill="#9A8C7C" letter-spacing="0.5">CURRENT ROLE</text>
  <text x="656" y="182" font-family="IBM Plex Mono, monospace" font-size="14" fill="#F5F0E6">Marketing &amp; Partnerships</text>
  <text x="656" y="200" font-family="IBM Plex Mono, monospace" font-size="14" fill="#F5F0E6">@ Dhobi G</text>

  <text x="972" y="160" font-family="IBM Plex Mono, monospace" font-size="11" fill="#9A8C7C" letter-spacing="0.5">BUILD MODE</text>
  <text x="972" y="182" font-family="IBM Plex Mono, monospace" font-size="14" fill="#C1813F" font-weight="600">PUBLIC</text>
  <text x="972" y="200" font-family="IBM Plex Mono, monospace" font-size="13" fill="#9A8C7C">(All work documented)</text>

  <!-- metrics row 2 -->
  <text x="24" y="240" font-family="IBM Plex Mono, monospace" font-size="11" fill="#9A8C7C" letter-spacing="0.5">JOURNEY</text>
  <text x="24" y="262" font-family="IBM Plex Mono, monospace" font-size="14" fill="#F5F0E6">Day 17 / 90 Monk Mode</text>
  <text x="24" y="280" font-family="IBM Plex Mono, monospace" font-size="12" fill="#9A8C7C">Discipline reset challenge</text>

  <text x="340" y="240" font-family="IBM Plex Mono, monospace" font-size="11" fill="#9A8C7C" letter-spacing="0.5">EXECUTION INDEX</text>
  <rect x="340" y="262" width="300" height="8" rx="4" fill="#232323"/>
  <rect x="340" y="262" width="180" height="8" rx="4" fill="#C1813F">
    <animate attributeName="width" values="120;220;120" dur="4s" repeatCount="indefinite"/>
  </rect>
  <text x="340" y="290" font-family="IBM Plex Mono, monospace" font-size="12" fill="#9A8C7C">Productivity: 63%</text>

  <text x="728" y="240" font-family="IBM Plex Mono, monospace" font-size="11" fill="#9A8C7C" letter-spacing="0.5">CURRENT SPRINT</text>
  <text x="728" y="262" font-family="IBM Plex Mono, monospace" font-size="14" fill="#F5F0E6">IBM PM Certification</text>
  <text x="728" y="280" font-family="IBM Plex Mono, monospace" font-size="12" fill="#9A8C7C">Formalizing PM skills</text>

  <text x="972" y="240" font-family="IBM Plex Mono, monospace" font-size="11" fill="#9A8C7C" letter-spacing="0.5">COMMIT STREAK</text>
  <text x="972" y="262" font-family="IBM Plex Mono, monospace" font-size="18" fill="#C1813F" font-weight="600">17 days</text>
  <text x="972" y="280" font-family="IBM Plex Mono, monospace" font-size="12" fill="#9A8C7C">Building in public</text>

  <line x1="24" y1="320" x2="1176" y2="320" stroke="#232323" stroke-width="1"/>
  <text x="24" y="356" font-family="IBM Plex Mono, monospace" font-size="13" fill="#9A8C7C" font-style="italic">Every commit compounds.</text>
  <text x="1176" y="356" font-family="IBM Plex Mono, monospace" font-size="11" fill="#5A5248" text-anchor="end">Rebuilt in public, daily</text>
</svg>
