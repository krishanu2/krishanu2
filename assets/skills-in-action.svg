<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="1200" height="380">
  <rect width="1200" height="380" fill="#171717" rx="16"/>
  <line x1="24" y1="24" x2="1176" y2="24" stroke="#232323" stroke-width="1"/>
  <text x="24" y="52" font-family="IBM Plex Mono, monospace" font-size="24" font-weight="600" fill="#F5F0E6">SKILLS IN ACTION</text>
  <text x="24" y="78" font-family="IBM Plex Mono, monospace" font-size="14" fill="#9A8C7C">Not a list. Things I actually do, daily.</text>
  <line x1="24" y1="96" x2="1176" y2="96" stroke="#232323" stroke-width="1"/>

  <!-- Card 1: Cold outreach / sales -->
  <rect x="24" y="116" width="270" height="240" rx="12" fill="#1E1E1E"/>
  <g transform="translate(124,140)">
    <circle cx="20" cy="20" r="14" fill="#E8E4D8"/>
    <path d="M8 18 A12 12 0 0 1 32 18" fill="none" stroke="#3A3328" stroke-width="3"/>
    <rect x="4" y="16" width="6" height="10" rx="3" fill="#C1813F"/>
    <rect x="30" y="16" width="6" height="10" rx="3" fill="#C1813F"/>
    <g stroke="#2F7F7A" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7">
      <path d="M40 18 Q46 14 40 8"><animate attributeName="opacity" values="0;1;0" dur="1.6s" repeatCount="indefinite"/></path>
      <path d="M46 22 Q54 14 46 2"><animate attributeName="opacity" values="0;1;0" dur="1.6s" begin="0.3s" repeatCount="indefinite"/></path>
    </g>
  </g>
  <text x="159" y="216" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="14" font-weight="600" fill="#F5F0E6">Cold Outreach</text>
  <text x="159" y="238" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#9A8C7C">100+ colleges, no script</text>
  <text x="159" y="256" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#9A8C7C">that survived contact</text>
  <rect x="44" y="300" width="230" height="6" rx="3" fill="#232323"/>
  <rect x="44" y="300" width="180" height="6" rx="3" fill="#C1813F"/>
  <text x="159" y="332" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#C1813F">expert</text>

  <!-- Card 2: Prioritization -->
  <rect x="310" y="116" width="270" height="240" rx="12" fill="#1E1E1E"/>
  <g transform="translate(410,150)">
    <rect x="0" y="30" width="14" height="20" fill="#232323"/>
    <rect x="20" y="18" width="14" height="32" fill="#8A5B2C"/>
    <rect x="40" y="4" width="14" height="46" fill="#C1813F"/>
    <rect x="60" y="22" width="14" height="28" fill="#232323"/>
  </g>
  <text x="445" y="216" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="14" font-weight="600" fill="#F5F0E6">Prioritization</text>
  <text x="445" y="238" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#9A8C7C">MoSCoW · RICE</text>
  <text x="445" y="256" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#9A8C7C">cut scope, ship faster</text>
  <rect x="330" y="300" width="230" height="6" rx="3" fill="#232323"/>
  <rect x="330" y="300" width="140" height="6" rx="3" fill="#C1813F"/>
  <text x="445" y="332" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#C1813F">practicing</text>

  <!-- Card 3: SQL / Data -->
  <rect x="596" y="116" width="270" height="240" rx="12" fill="#1E1E1E"/>
  <g transform="translate(696,148)">
    <rect x="0" y="0" width="70" height="48" rx="6" fill="#171717" stroke="#1E2A4D" stroke-width="2"/>
    <text x="8" y="18" font-family="IBM Plex Mono, monospace" font-size="9" fill="#2F7F7A">SELECT *</text>
    <text x="8" y="30" font-family="IBM Plex Mono, monospace" font-size="9" fill="#9A8C7C">FROM users</text>
    <rect x="8" y="36" width="0" height="6" fill="#C1813F">
      <animate attributeName="width" values="0;40;0" dur="2.2s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="731" y="216" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="14" font-weight="600" fill="#F5F0E6">SQL &amp; Data</text>
  <text x="731" y="238" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#9A8C7C">querying for decisions,</text>
  <text x="731" y="256" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#9A8C7C">not for show</text>
  <rect x="616" y="300" width="230" height="6" rx="3" fill="#232323"/>
  <rect x="616" y="300" width="70" height="6" rx="3" fill="#C1813F"/>
  <text x="731" y="332" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#C1813F">learning</text>

  <!-- Card 4: Shipping / building -->
  <rect x="882" y="116" width="270" height="240" rx="12" fill="#1E1E1E"/>
  <g transform="translate(982,150)">
    <rect x="0" y="0" width="70" height="44" rx="6" fill="#0D1530"/>
    <text x="8" y="18" font-family="IBM Plex Mono, monospace" font-size="9" fill="#2F7F7A">git commit</text>
    <text x="8" y="30" font-family="IBM Plex Mono, monospace" font-size="9" fill="#C1813F">-m "ship it"</text>
    <circle cx="58" cy="6" r="3" fill="#2F7F7A">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="1017" y="216" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="14" font-weight="600" fill="#F5F0E6">Shipping</text>
  <text x="1017" y="238" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#9A8C7C">building with Claude Code,</text>
  <text x="1017" y="256" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#9A8C7C">daily, in public</text>
  <rect x="902" y="300" width="230" height="6" rx="3" fill="#232323"/>
  <rect x="902" y="300" width="160" height="6" rx="3" fill="#C1813F"/>
  <text x="1017" y="332" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#C1813F">active</text>
</svg>
