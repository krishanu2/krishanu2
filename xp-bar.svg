<svg xmlns="http://www.w3.org/2000/svg" width="500" height="90" viewBox="0 0 500 90">
  <text x="0" y="20" font-family="Fira Code, monospace" font-size="14" fill="#E9E0CD" font-weight="bold">PRODUCT MANAGER — LV. 1</text>
  <text x="0" y="38" font-family="Fira Code, monospace" font-size="11" fill="#A89C84">XP: market research, prioritization, SQL, shipping</text>

  <rect x="0" y="50" width="500" height="22" rx="11" fill="#241F19" stroke="#3C3327" stroke-width="2"/>
  <clipPath id="bar-clip">
    <rect x="3" y="53" width="494" height="16" rx="8"/>
  </clipPath>
  <rect x="3" y="53" width="160" height="16" rx="8" fill="#C1813F" clip-path="url(#bar-clip)">
    <animate attributeName="width" values="120;170;120" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="3" y="53" width="494" height="16" rx="8" fill="none" stroke="#8A5B2C" stroke-width="1" opacity="0.5"/>

  <text x="500" y="38" text-anchor="end" font-family="Fira Code, monospace" font-size="11" fill="#8A5B2C">next unlock: shipped MVP</text>
</svg>
